version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: car-catalog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: car_catalog
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - car-catalog-network

  app:
    image: car-catalog-api
    container_name: car-catalog-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=car_catalog
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      - SERVER_PORT=8080
    networks:
      - car-catalog-network

volumes:
  db_data:

networks:
  car-catalog-network:
